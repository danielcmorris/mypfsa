<app-account-top-header></app-account-top-header>
<app-account-navbar></app-account-navbar>

<div class="account-agent-edit-area">
    <div class="container-fluid">

        <!-- Top bar -->
        <div class="top-bar">
            <a [routerLink]="['/account/agents', agentId]" class="back-link">
                <i class="bx bx-arrow-back"></i> Back to Agent
            </a>
        </div>

        <!-- Loading -->
        <div *ngIf="loading" class="state-message">
            <i class="bx bx-loader-alt bx-spin"></i>
            <span>Loading agent...</span>
        </div>

        <!-- Load Error -->
        <div *ngIf="loadError" class="state-message error">
            <i class="bx bx-error-circle"></i>
            <span>Agent not found or failed to load.</span>
        </div>

        <div *ngIf="!loading && !loadError && agent" class="edit-layout">

            <!-- Photo Upload Card -->
            <div class="card photo-card">
                <h2><i class="bx bx-image"></i> Photo</h2>

                <div class="photo-preview">
                    <img *ngIf="photoPreview || agent.imgUri" [src]="photoPreview || agent.imgUri!" alt="Agent photo">
                    <div *ngIf="!photoPreview && !agent.imgUri" class="photo-placeholder"></div>
                </div>

                <label class="file-label">
                    <input type="file" accept="image/jpeg,image/png,image/gif,image/webp" (change)="onFileSelected($event)" hidden>
                    <i class="bx bx-upload"></i> Choose Image
                </label>
                <p class="file-hint">JPEG, PNG, GIF, or WebP — max 5MB</p>

                <div *ngIf="selectedFile" class="selected-file">
                    <i class="bx bx-file"></i> {{ selectedFile.name }}
                </div>

                <button class="btn-upload" (click)="uploadPhoto()" [disabled]="!selectedFile || uploading">
                    <i class="bx" [ngClass]="uploading ? 'bx-loader-alt bx-spin' : 'bx-cloud-upload'"></i>
                    {{ uploading ? 'Uploading...' : 'Upload Photo' }}
                </button>

                <div *ngIf="uploadSuccess" class="alert alert-success">
                    <i class="bx bx-check-circle"></i> Photo uploaded successfully.
                </div>
                <div *ngIf="uploadError" class="alert alert-error">
                    <i class="bx bx-error-circle"></i> {{ uploadError }}
                </div>
            </div>

            <!-- Edit Form Card -->
            <div class="card form-card">
                <h2><i class="bx bx-edit"></i> Edit Agent — {{ agent.firstName }} {{ agent.lastName }}</h2>

                <form (ngSubmit)="saveAgent()" #agentForm="ngForm">

                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input id="firstName" type="text" [(ngModel)]="agent.firstName" name="firstName" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input id="lastName" type="text" [(ngModel)]="agent.lastName" name="lastName" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="license">License #</label>
                            <input id="license" type="text" [(ngModel)]="agent.license" name="license">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone</label>
                            <input id="phone" type="text" [(ngModel)]="agent.phone" name="phone">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input id="email" type="email" [(ngModel)]="agent.email" name="email">
                        </div>
                        <div class="form-group">
                            <label for="fax">Fax</label>
                            <input id="fax" type="text" [(ngModel)]="agent.fax" name="fax">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="officeHours">Office Hours</label>
                        <input id="officeHours" type="text" [(ngModel)]="agent.officeHours" name="officeHours">
                    </div>

                    <div class="form-group">
                        <label for="languages">Languages</label>
                        <input id="languages" type="text" [(ngModel)]="agent.languages" name="languages" placeholder="e.g. English, Portuguese">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="facebook">Facebook URL</label>
                            <input id="facebook" type="url" [(ngModel)]="agent.facebook" name="facebook">
                        </div>
                        <div class="form-group">
                            <label for="linkedIn">LinkedIn URL</label>
                            <input id="linkedIn" type="url" [(ngModel)]="agent.linkedIn" name="linkedIn">
                        </div>
                    </div>

                    <div *ngIf="saveSuccess" class="alert alert-success">
                        <i class="bx bx-check-circle"></i> Agent saved successfully.
                    </div>
                    <div *ngIf="saveError" class="alert alert-error">
                        <i class="bx bx-error-circle"></i> {{ saveError }}
                    </div>

                    <div class="form-actions">
                        <a [routerLink]="['/account/agents', agentId]" class="btn-cancel">Cancel</a>
                        <button type="submit" class="btn-save" [disabled]="saving || agentForm.invalid">
                            <i class="bx" [ngClass]="saving ? 'bx-loader-alt bx-spin' : 'bx-save'"></i>
                            {{ saving ? 'Saving...' : 'Save Changes' }}
                        </button>
                    </div>

                </form>
            </div>

        </div>

    </div>
</div>

<app-footer></app-footer>
