<app-top-header />
<app-navbar />

<div class="search-page-area">
    <div class="container">

        <!-- Header -->
        <div class="search-page-header">
            <h1><i class="bx bx-search-alt-2"></i> {{ topicLabel }} Archive Search</h1>
        </div>

        <!-- Search Box -->
        <div class="search-card">
            <div class="search-input-wrapper">
                <i class="bx bx-search search-icon"></i>
                <input
                    type="text"
                    class="search-input"
                    placeholder="Ask a question or search for a topic..."
                    [(ngModel)]="query"
                    (keydown)="onKeyDown($event)"
                    [disabled]="loading"
                />
                <button *ngIf="query" class="btn-clear" (click)="clear()" title="Clear search">
                    <i class="bx bx-x"></i>
                </button>
                <button class="btn-search" (click)="search()" [disabled]="loading || !query.trim()">
                    <span *ngIf="!loading">Search</span>
                    <span *ngIf="loading"><i class="bx bx-loader-alt bx-spin"></i> Searching...</span>
                </button>
            </div>
        </div>

        <!-- Loading -->
        <div *ngIf="loading" class="state-message">
            <i class="bx bx-loader-alt bx-spin"></i>
            <span>Searching archives...</span>
        </div>

        <!-- Error -->
        <div *ngIf="error" class="state-message error">
            <i class="bx bx-error-circle"></i>
            <span>Search failed. Please try again.</span>
        </div>

        <!-- Results -->
        <div *ngIf="result && !loading" class="results-card">
            <div class="results-header">
                <i class="bx bx-file-find"></i>
                <h3>Summary</h3>
            </div>
            <div class="summary-text" [innerHTML]="renderedSummary"></div>

            <!-- Sources -->
            <div *ngIf="result.results && result.results.length > 0" class="sources-section">
                <h4 class="sources-title">Sources</h4>
                <ol class="sources-list">
                    <li *ngFor="let item of result.results" class="source-item">
                        <div class="source-info">
                            <a *ngIf="item.fileUrl" [href]="item.fileUrl" target="_blank" rel="noopener" class="source-title-link">
                                <i class="bx bxs-file-pdf"></i> {{ item.title }}
                            </a>
                            <span *ngIf="!item.fileUrl" class="source-title">{{ item.title }}</span>
                            <span *ngIf="item.snippet && item.snippet !== 'No snippet is available for this page.'" class="source-snippet" [innerHTML]="item.snippet"></span>
                        </div>
                    </li>
                </ol>
            </div>
        </div>

        <!-- Newsletter archive (shown when no search is active) -->
        <div *ngIf="topic === 'newsletters' && !result && !loading && !error">
            <app-newsletters></app-newsletters>
        </div>

    </div>
</div>

<app-footer />
